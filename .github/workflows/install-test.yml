name: Test Installation Scripts

on:
    push:
        branches: ["main"]
        paths:
            - "install.sh"
            - "uninstall.sh"
            - ".github/workflows/install-test.yml"
    release:
        types: [published]

jobs:
    test-installation:
        name: Test installation on ${{ matrix.os_name }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      os_name: Linux
                    - os: macos-latest
                      os_name: macOS
                    - os: windows-latest
                      os_name: Windows

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Wait for release assets to be available
              if: github.event_name == 'release'
              run: |
                  # Sleep to ensure assets are available
                  echo "Waiting for release assets to be available..."
                  sleep 30

            - name: Test installation
              run: |
                  chmod +x install.sh
                  ./install.sh

                  # Verify binary is installed and executable
                  if [ "${{ matrix.os }}" == "windows-latest" ]; then
                    # For Windows, check if the file exists in the current directory
                    if [ -f "gito.exe" ]; then
                      echo "✅ gito.exe was downloaded successfully"
                      # Test basic execution
                      ./gito.exe --version || echo "::warning::gito.exe execution failed, but installation test continues"
                    else
                      echo "::error::gito.exe was not downloaded"
                      exit 1
                    fi
                  else
                    # For Linux and macOS
                    which gito
                    if [ $? -eq 0 ]; then
                      echo "✅ gito is installed and in PATH"
                      # Test basic execution
                      gito --version || echo "::warning::gito execution failed, but installation test continues"
                    else
                      echo "::error::gito is not in PATH"
                      exit 1
                    fi
                  fi

            - name: Test uninstallation
              run: |
                  chmod +x uninstall.sh
                  ./uninstall.sh

                  # Verify binary is removed
                  if [ "${{ matrix.os }}" == "windows-latest" ]; then
                    # For Windows, check the file is gone from the current directory
                    if [ ! -f "gito.exe" ]; then
                      echo "✅ gito.exe was removed successfully"
                    else
                      echo "::error::gito.exe was not removed"
                      exit 1
                    fi
                  else
                    # For Linux and macOS
                    which gito
                    if [ $? -ne 0 ]; then
                      echo "✅ gito was uninstalled successfully"
                    else
                      echo "::error::gito is still in PATH after uninstallation"
                      exit 1
                    fi
                  fi

    test-readme-commands:
        name: Test README installation commands
        runs-on: ${{ matrix.os }}
        if: github.event_name == 'release'
        needs: test-installation
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      os_name: Linux
                    - os: macos-latest
                      os_name: macOS
                    - os: windows-latest
                      os_name: Windows

        steps:
            - name: Test curl installation (Linux/macOS)
              if: matrix.os != 'windows-latest'
              run: |
                  # Clean any previous installation
                  sudo rm -f /usr/local/bin/gito

                  # Test the one-line install command from README
                  curl -sSL https://raw.githubusercontent.com/pedro3g/gito/main/install.sh | bash

                  # Verify installation
                  which gito
                  if [ $? -eq 0 ]; then
                    echo "✅ gito installed successfully via curl command"
                    # Test basic execution
                    gito --version || echo "::warning::gito execution failed, but curl installation test continues"
                  else
                    echo "::error::curl installation failed"
                    exit 1
                  fi

                  # Clean up
                  sudo rm -f /usr/local/bin/gito

            - name: Test curl installation (Windows)
              if: matrix.os == 'windows-latest'
              run: |
                  # Test the PowerShell install commands from README
                  Invoke-WebRequest -Uri https://raw.githubusercontent.com/pedro3g/gito/main/install.sh -OutFile install.sh
                  bash install.sh

                  # Verify installation (in Windows it stays in current directory)
                  if (Test-Path gito.exe) {
                    Write-Host "✅ gito.exe downloaded successfully via PowerShell command"
                    # Test basic execution
                    ./gito.exe --version
                  } else {
                    Write-Host "::error::PowerShell installation failed"
                    exit 1
                  }

                  # Clean up
                  Remove-Item -Force gito.exe -ErrorAction SilentlyContinue
              shell: pwsh
